<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VuTungToolHEX | Mobile Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050508;
            --panel-bg: rgba(12, 12, 16, 0.65);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-1: #6366f1; /* Tím nhạt */
            --accent-2: #00d2ff; /* Xanh lơ */
            --text-main: #f8f9fa;
            --text-dim: #8b8b99;
            --success: #00fa9a;
            --danger: #ff4757;
            --card-bg: rgba(25, 25, 35, 0.4);
        }

        * { 
            box-sizing: border-box; 
            outline: none; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body {
            background-color: var(--bg-dark);
            /* Nền lưới Grid Hi-tech + Glow góc */
            background-image: 
                radial-gradient(circle at 10% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 90% 100%, rgba(0, 210, 255, 0.12) 0%, transparent 50%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 24px 24px, 24px 24px;
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Container Chính */
        .app-wrapper {
            width: 100%;
            max-width: 850px;
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            /* Bóng đổ đa tầng tạo chiều sâu */
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.😎,
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Line Gradient mỏng trên cùng */
        .app-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-1), var(--accent-2), transparent);
            opacity: 0.5;
        }

        /* Header */
        .app-header {
            padding: 20px 25px;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-icon { 
            width: 28px; 
            height: 28px; 
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); 
            border-radius: 8px; 
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); 
            position: relative;
        }
        /* Chấm nháy bên trong icon */
        .brand-icon::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 8px; height: 8px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff;
        }

        .brand-name { 
            font-weight: 700; 
            font-size: 1.15rem; 
            letter-spacing: 0.5px; 
        }

        /* File Info Bar */
        .file-info {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-2);
            background: rgba(0, 210, 255, 0.08);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
        }

        /* File Upload Zone */
        #dropZone {
            border: 2px dashed rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.2);
            padding: 45px 20px;
            text-align: center;
            margin: 25px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Mượt như lò xo */
        }
        
        #dropZone:hover {
            border-color: var(--accent-2);
            background: rgba(0, 210, 255, 0.03);
            transform: scale(1.02);
        }

        .drop-icon {
            font-size: 2.8rem;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            transition: transform 0.3s;
        }
        #dropZone:hover .drop-icon { transform: translateY(-5px); }

        .drop-title { font-weight: 600; font-size: 1.1rem; color: #fff; }
        .drop-desc { font-size: 0.85rem; color: var(--text-dim); margin-top: 8px; }

        /* Control Panel */
        .control-panel {
            padding: 0 25px 25px 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .mode-row { display: flex; gap: 10px; }

        select, input {
            background: var(--card-bg);
            border: 1px solid transparent;
            color: var(--text-main);
            padding: 14px 18px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        select { 
            flex: 1; 
            -webkit-appearance: none; 
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2300d2ff%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); 
            background-repeat: no-repeat; 
            background-position: right 15px top 50%; 
            background-size: 10px; 
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        select:focus, input:focus {
            background: rgba(0, 0, 0, 0.6);
            border-color: var(--accent-1);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        input { width: 100%; border: 1px solid rgba(255, 255, 255, 0.08); }
        input::placeholder { color: #555; font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Nút MÒ Ultra Pro */
        .scan-btn {
            background: linear-gradient(45deg, var(--accent-1), var(--accent-2), var(--accent-1));
            background-size: 200% auto;
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
            animation: shine 3s linear infinite; /* Animation LED chạy */
        }
        
        @keyframes shine {
            to { background-position: 200% center; }
        }

        .scan-btn:hover {
            box-shadow: 0 12px 25px rgba(0, 210, 255, 0.4);
            transform: translateY(-2px) scale(1.01);
        }
        .scan-btn:active { transform: translateY(1px); }

        /* Progress Bar */
        .progress-container {
            height: 3px;
            background: rgba(255,255,255,0.05);
            width: 100%;
            display: none;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-1), var(--success));
            width: 0%;
            transition: width 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--success);
        }

        /* Results Area */
        .results-container {
            padding: 0 25px 25px;
            background: rgba(0, 0, 0, 0.3);
            min-height: 250px;
            max-height: 480px;
            overflow-y: auto;
            border-top: 1px solid var(--panel-border);
            box-shadow: inset 0 10px 20px -10px rgba(0,0,0,0.5);
        }

        .results-container::-webkit-scrollbar { width: 4px; }
        .results-container::-webkit-scrollbar-track { background: transparent; }
        .results-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        .results-container::-webkit-scrollbar-thumb:hover { background: var(--accent-2); }

        .result-header {
            margin: 20px 0 15px 0;
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            padding-bottom: 10px;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
        }

        /* Thẻ kết quả - Thêm Animation xuất hiện */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-left: 3px solid var(--accent-1);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            transition: transform 0.2s ease, border-color 0.2s ease;
            animation: slideUpFade 0.4s ease forwards; /* Áp dụng Animation */
        }
        
        .result-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-left-color: var(--success);
            transform: translateX(4px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .offset-label { 
            color: var(--text-dim); 
            font-size: 0.75rem; 
            display: flex; 
            justify-content: space-between;
            margin-bottom: 10px; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .hex-preview { 
            color: var(--accent-2); 
            word-break: break-all; 
            margin-bottom: 10px; 
            line-height: 1.6;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 8px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .ascii-preview { 
            color: #d1d1e0; 
            font-size: 0.8rem; 
            word-break: break-all; 
            background: rgba(255,255,255,0.03); 
            padding: 8px 10px; 
            border-radius: 6px; 
            border: 1px solid rgba(255,255,255,0.02);
            line-height: 1.5;
        }

        .status-msg {
            text-align: center;
            color: var(--text-dim);
            padding-top: 60px;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .pulse-icon {
            font-size: 2.2rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 15px var(--accent-2); }
            100% { transform: scale(1); opacity: 0.5; }
        }

        /* Media Queries */
        @media (min-width: 768px) {
            .control-panel { flex-direction: row; align-items: flex-end; }
            .input-group { flex: 1; flex-direction: row; align-items: center; padding: 10px; border-radius: 14px;}
            .mode-row { min-width: 160px; }
            .scan-btn { width: 140px; padding: 0; height: 50px; }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header class="app-header">
        <div class="brand">
            <div class="brand-icon"></div>
            <div class="brand-name">HEX Tool <span style="font-weight:400; font-size:0.8rem; color:var(--text-dim)">(cre:VuTungIOS)</span></div>
        </div>
        <div id="fileInfo" class="file-info" style="display:none;"></div>
    </header>

    <div id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="drop-icon">🧊</div>
        <div class="drop-title">Thả file hoặc chạm để chọn</div>
        <div class="drop-desc">Hỗ trợ Dylib, Bin, Hex, Txt...</div>
        <input type="file" id="fileInput" hidden>
    </div>

    <div class="control-panel">
        <div class="input-group">
            <div class="mode-row">
                <select id="scanMode">
                    <option value="text">STRING</option>
                    <option value="hex">HEX</option>
                </select>
            </div>
            <input type="text" id="queryInput" placeholder="Nhập dữ liệu cần mò..." autocomplete="off">
        </div>
        <button class="scan-btn" onclick="startDeepScan()">MÒ</button>
    </div>
    
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="results-container" id="resultsArea">
        <div class="status-msg">
            <span class="pulse-icon">⚡</span>
            <span>Hệ thống sẵn sàng.</span>
        </div>
    </div>
</div>

<script>
    // --- GIỮ NGUYÊN 100% CODE LOGIC CỦA BẠN ---
    let fileBuffer = null;
    let isScanning = false;

    // --- XỬ LÝ FILE ---
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(evt) {
            fileBuffer = new Uint8Array(evt.target.result);
            
            // UI Update
            document.getElementById('dropZone').style.display = 'none';
            const info = document.getElementById('fileInfo');
            info.style.display = 'block';
            info.textContent = ${file.name} (${formatBytes(file.size)});
            
            document.getElementById('resultsArea').innerHTML = `
                <div class="status-msg">
                    <span style="color: var(--success); font-weight: 600; font-size: 1.1rem;">Đã nạp tệp: ${formatBytes(file.size)}</span>
                    <span style="color: var(--text-dim)">Sẵn sàng thực thi Deep Scan.</span>
                </div>`;
        };
        reader.readAsArrayBuffer(file);
    });

    // --- HÀM QUÉT CHUYÊN SÂU (ASYNC/NON-BLOCKING) ---
    async function startDeepScan() {
        if (!fileBuffer) return alert("Chưa chọn file!");
        if (isScanning) return;

        const queryStr = document.getElementById('queryInput').value.trim();
        const mode = document.getElementById('scanMode').value;
        if (!queryStr) return alert("Chưa nhập nội dung tìm kiếm!");

        // 1. Chuẩn bị dữ liệu tìm kiếm (Byte array)
        let targetBytes;
        try {
            if (mode === 'text') {
                targetBytes = new TextEncoder().encode(queryStr);
            } else {
                // Tự động làm sạch mã Hex (xóa khoảng trắng, 0x)
                const cleanHex = queryStr.replace(/[^0-9A-Fa-f]/g, '');
                if (cleanHex.length % 2 !== 0) throw new Error("Mã Hex lẻ ký tự!");
                targetBytes = new Uint8Array(cleanHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            }
        } catch (e) {
            return alert("Lỗi định dạng đầu vào: " + e.message);
        }

        // 2. Thiết lập giao diện quét
        isScanning = true;
        const resultsArea = document.getElementById('resultsArea');
        resultsArea.innerHTML = '<div class="result-header">Đang chạy thuật toán Deep Scan...</div>';
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        progressContainer.style.display = 'block';
        
        let foundCount = 0;
        let resultsHTML = '';
        const chunkSize = 500000; // Quét 500KB mỗi lần để không đơ máy
        let currentIndex = 0;

        // 3. Hàm quét từng đoạn (Chunk Loop)
        function scanChunk() {
            const end = Math.min(currentIndex + chunkSize, fileBuffer.length);
            
            // Tìm kiếm trong đoạn này
            // Lưu ý: Cần quét lùi lại length-1 để không mất dữ liệu nằm giữa 2 chunk
            let searchLimit = end;
            if (end < fileBuffer.length) searchLimit += targetBytes.length; 

            for (let i = currentIndex; i < end; i++) {
                // Kiểm tra giới hạn mảng
                if (i + targetBytes.length > fileBuffer.length) break;

                // So sánh Byte-by-Byte (Chính xác 100%)
                let match = true;
                for (let j = 0; j < targetBytes.length; j++) {
                    if (fileBuffer[i + j] !== targetBytes[j]) {
                        match = false;
                        break;
                    }
                }

                if (match) {
                    foundCount++;
                    if (foundCount <= 50) { // Chỉ render 50 kết quả đầu để mượt UI
                        resultsHTML += renderResultCard(i, targetBytes.length);
                    }
                }
            }

            // Cập nhật tiến trình
            currentIndex = end;
            const percent = Math.round((currentIndex / fileBuffer.length) * 100);
            progressBar.style.width = percent + "%";

            // Tiếp tục hoặc Kết thúc
            if (currentIndex < fileBuffer.length) {
                // Sử dụng requestAnimationFrame hoặc setTimeout để UI không bị đơ
                setTimeout(scanChunk, 0);
            } else {
                finishScan(foundCount, resultsHTML);
            }
        }

        scanChunk(); // Bắt đầu chạy
    }

    function finishScan(count, html) {
        isScanning = false;
        const resultsArea = document.getElementById('resultsArea');
        const limitMsg = count > 50 ? <small style="color:var(--accent-2); font-weight:normal">(Hiển thị 50/${count})</small> : '';
        
        const header = `
            <div class="result-header">
                <span style="color: var(--success); text-shadow: 0 0 10px rgba(0,250,154,0.4)">✔ HOÀN TẤT</span>
                <span>TÌM THẤY: <b style="color: #fff; font-size: 1rem;">${count}</b> VỊ TRÍ ${limitMsg}</span>
            </div>
        `;
        
        if (count === 0) {
            resultsArea.innerHTML = header + <div class="status-msg">Không tìm thấy dữ liệu khớp.</div>;
        } else {
            resultsArea.innerHTML = header + html;
        }
        
        setTimeout(() => {
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('progressBar').style.width = '0%';
        }, 1000);
    }

    // --- RENDER KẾT QUẢ ---
    function renderResultCard(index, len) {
        const offsetHex = "0x" + index.toString(16).toUpperCase().padStart(8, '0');
        const offsetDec = index.toString();
        
        // Lấy ngữ cảnh: 4 byte trước + match + 4 byte sau
        const startCtx = Math.max(0, index - 4);
        const endCtx = Math.min(fileBuffer.length, index + len + 4);
        const contextBytes = fileBuffer.slice(startCtx, endCtx);
        
        let hexStr = "";
        let asciiStr = "";

        // Highlight logic đơn giản cho Hex
        for(let i=0; i < contextBytes.length; i++) {
            const byte = contextBytes[i];
            const realIdx = startCtx + i;
            const isMatch = (realIdx >= index && realIdx < index + len);
            
            const h = byte.toString(16).toUpperCase().padStart(2,'0');
            const a = (byte >= 32 && byte <= 126) ? String.fromCharCode(byte) : '.';

            if(isMatch) {
                hexStr += <span style="color: var(--success); font-weight:bold; text-shadow: 0 0 8px rgba(0,250,154,0.4)">${h}</span> ;
                asciiStr += <span style="color: var(--success); font-weight:bold">${escapeHtml(a)}</span>;
            } else {
                hexStr += <span style="color: #555">${h}</span> ;
                asciiStr += escapeHtml(a);
            }
        }

        return `
            <div class="result-card">
                <div class="offset-label">
                    <span>OFFSET: <span style="color:#fff">${offsetHex}</span></span>
                    <span style="color:#666">DEC: ${offsetDec}</span>
                </div>
                <div class="hex-preview">${hexStr}</div>
                <div class="ascii-preview">${asciiStr}</div>
            </div>
        `;
    }

    function formatBytes(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
</script>

</body>
</html>
